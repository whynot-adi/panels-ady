<!DOCTYPE html>
<html>
<head>
<title>Panels.Ady</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111827;
padding:20px;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

.subtitle{
color:#9ca3af;
margin-bottom:30px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.card{
background:#1f2937;
padding:25px;
border-radius:12px;
width:250px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #22c55e;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

footer{
margin-top:50px;
padding:20px;
background:#111827;
color:#9ca3af;
}

</style>
</head>

<body>

<header>Panels.Ady</header>

<p class="subtitle">Premium Gaming Tools & Panels</p>

<div class="container">

<div class="card">
<h2>Sensi Finder</h2>
<p>Find the perfect sensitivity for your aim.</p>
<button>Download</button>
</div>

<div class="card">
<h2>FPS Booster</h2>
<p>Boost your game performance and reduce lag.</p>
<button>Download</button>
</div>

<div class="card">
<h2>Config Pack</h2>
<p>Optimized configs for competitive gameplay.</p>
<button>Download</button>
</div>

</div>

<footer>
Panels.Ady © 2026
</footer>

</body>
</html>
